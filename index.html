<!DOCTYPE html>
<html lang="he" dir="rtl">
    <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <title>Simpler - Intuitive Sequencer</title>
        <style>
                    :root {
                                    --bg: #121212;
                                    --surface: #1e1e1e;
                                    --text: #e0e0e0;
                                    --accent: #4a9eff;
                    }

                    body.light-mode {
                                    --bg: #f5f5f5;
                                    --surface: #ffffff;
                                    --text: #333;
                    }

                    * {
                                    box-sizing: border-box;
                    }

                    body {
                                    margin: 0;
                                    padding: 0;
                                    background: var(--bg);
                                    color: var(--text);
                                    font-family: 'Segoe UI', system-ui, sans-serif;
                                    display: flex;
                                    flex-direction: column;
                                    height: 100vh;
                                    overflow: hidden;
                                    transition: background 0.3s;
                    }

                    /* Header */
                    .header {
                                    display: flex;
                                    justify-content: space-between;
                                    align-items: center;
                                    padding: 12px 20px;
                                    background: var(--surface);
                                    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                                    z-index: 100;
                    }

                    .header h1 {
                                    margin: 0;
                                    font-size: 18px;
                                    font-weight: 600;
                    }

                    .controls {
                                    display: flex;
                                    gap: 12px;
                    }

                    .btn {
                                    padding: 8px 16px;
                                    background: var(--surface);
                                    color: var(--text);
                                    border: 1px solid rgba(255, 255, 255, 0.2);
                                    border-radius: 6px;
                                    cursor: pointer;
                                    font-size: 13px;
                                    transition: all 0.2s;
                    }

                    .btn:hover {
                                    background: var(--accent);
                                    color: #fff;
                                    border-color: var(--accent);
                    }

                    .btn.active {
                                    background: var(--accent);
                                    color: #fff;
                    }

                    /* Main Content */
                    .main-container {
                                    display: flex;
                                    flex: 1;
                                    overflow: hidden;
                    }

                    /* Waveform Area */
                    .waveform-area {
                                    flex: 1;
                                    display: flex;
                                    flex-direction: column;
                                    background: var(--bg);
                                    overflow: hidden;
                    }

                    .canvas-container {
                                    flex: 1;
                                    position: relative;
                                    display: flex;
                                    align-items: center;
                                    justify-content: center;
                                    overflow: hidden;
                    }

                    canvas {
                                    width: 100%;
                                    height: 100%;
                                    cursor: crosshair;
                    }

                    /* Sample Markers (Circles) - Much Smaller */
                    .sample-marker {
                                    position: absolute;
                                    width: 14px;
                                    height: 14px;
                                    border-radius: 50%;
                                    cursor: grab;
                                    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
                                    z-index: 10;
                                    transition: transform 0.1s;
                                    border: 1px solid rgba(255, 255, 255, 0.3);
                    }

                    .sample-marker:hover {
                                    transform: scale(1.3);
                                    z-index: 11;
                    }

                    .sample-marker:active {
                                    cursor: grabbing;
                    }

                    /* Color palette for samples (pastel metallic) */
                    .sample-marker.c1 { background: #FFB3BA; }
                    .sample-marker.c2 { background: #FFCCCB; }
                    .sample-marker.c3 { background: #FFE4B5; }
                    .sample-marker.c4 { background: #E0FFCC; }
                    .sample-marker.c5 { background: #CCE5FF; }
                    .sample-marker.c6 { background: #E0CCFF; }
                    .sample-marker.c7 { background: #FFCCF0; }
                    .sample-marker.c8 { background: #C7FFDA; }
                    .sample-marker.c9 { background: #FFF0CC; }
                    .sample-marker.c10 { background: #D4EBFF; }

                    /* Bottom Controls Panel */
                    .bottom-panel {
                                    background: var(--surface);
                                    border-top: 1px solid rgba(255, 255, 255, 0.1);
                                    padding: 12px 20px;
                                    display: flex;
                                    gap: 20px;
                                    align-items: center;
                                    height: 80px;
                                    overflow-x: auto;
                    }

                    .mode-indicator {
                                    font-size: 12px;
                                    text-transform: uppercase;
                                    letter-spacing: 1px;
                                    color: var(--accent);
                                    font-weight: 600;
                    }

                    .action-buttons {
                                    display: flex;
                                    gap: 8px;
                    }

                    /* Sequencer Panel (Right Side) */
                    .sequencer-panel {
                                    width: 280px;
                                    background: var(--surface);
                                    border-left: 1px solid rgba(255, 255, 255, 0.1);
                                    padding: 16px;
                                    overflow-y: auto;
                                    display: flex;
                                    flex-direction: column;
                                    gap: 16px;
                    }

                    .sequencer-panel h3 {
                                    margin: 0;
                                    font-size: 13px;
                                    text-transform: uppercase;
                                    letter-spacing: 1px;
                                    color: rgba(255, 255, 255, 0.5);
                    }

                    .sequencer-grid {
                                    display: grid;
                                    grid-template-columns: repeat(5, 1fr);
                                    gap: 8px;
                    }

                    .sequencer-circle {
                                    aspect-ratio: 1;
                                    border-radius: 50%;
                                    cursor: pointer;
                                    border: 2px solid rgba(255, 255, 255, 0.2);
                                    transition: all 0.2s;
                                    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
                    }

                    .sequencer-circle:hover {
                                    border-color: rgba(255, 255, 255, 0.5);
                                    transform: scale(1.05);
                    }

                    .sequencer-circle.active {
                                    border-color: #fff;
                                    box-shadow: 0 0 12px rgba(255, 255, 255, 0.6);
                    }

                    /* Edit Panel */
                    .edit-panel {
                                    display: none;
                                    flex-direction: column;
                                    gap: 12px;
                                    padding-top: 12px;
                                    border-top: 1px solid rgba(255, 255, 255, 0.1);
                    }

                    .edit-panel.active {
                                    display: flex;
                    }

                    .param-control {
                                    display: flex;
                                    flex-direction: column;
                                    gap: 6px;
                    }

                    .param-label {
                                    font-size: 11px;
                                    text-transform: uppercase;
                                    letter-spacing: 0.8px;
                                    color: rgba(255, 255, 255, 0.6);
                    }

                    .control-knob {
                                    width: 60px;
                                    height: 60px;
                                    border-radius: 50%;
                                    border: 3px solid rgba(255, 255, 255, 0.3);
                                    background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.1), rgba(0, 0, 0, 0.3));
                                    cursor: pointer;
                                    position: relative;
                                    display: flex;
                                    align-items: center;
                                    justify-content: center;
                                    font-size: 11px;
                                    color: rgba(255, 255, 255, 0.8);
                                    transition: all 0.2s;
                    }

                    .control-knob:hover {
                                    border-color: rgba(255, 255, 255, 0.6);
                    }

                    .control-knob::after {
                                    content: '';
                                    position: absolute;
                                    width: 2px;
                                    height: 18px;
                                    background: var(--accent);
                                    top: 8px;
                                    border-radius: 1px;
                                    transform-origin: center 26px;
                    }

                    .knob-row {
                                    display: flex;
                                    gap: 8px;
                                    justify-content: space-around;
                    }

                    /* Responsive */
                    @media (max-width: 768px) {
                                    .main-container {
                                                        flex-direction: column;
                                    }

                                    .sequencer-panel {
                                                        width: 100%;
                                                        border-left: none;
                                                        border-top: 1px solid rgba(255, 255, 255, 0.1);
                                                        height: auto;
                                                        max-height: 200px;
                                    }

                                    .bottom-panel {
                                                        height: auto;
                                    }

                                    .sequencer-grid {
                                                        grid-template-columns: repeat(10, 1fr);
                                    }
                    }

                    /* Play mode - hide edit controls */
                    .play-mode .edit-panel {
                                    display: none !important;
                    }

                    .play-mode .sequencer-grid {
                                    max-height: 180px;
                                    overflow-y: auto;
                    }

                    /* Animation */
                    @keyframes pulse {
                                    0%, 100% { opacity: 1; }
                                    50% { opacity: 0.7; }
                    }

                    .sample-marker.playing {
                                    animation: pulse 0.3s ease-in-out;
                    }
                </style>
    </head>
    <body>
            <div class="header">
                        <h1>סימפלר</h1>
                    <div class="controls">
                                <button class="btn active" data-mode="record">🎙️ הקלטה</button>button>
                                <button class="btn" data-mode="edit">✏️ עריכה</button>button>
                                <button class="btn" data-mode="play">▶️ נגינה</button>button>
                                <button class="btn" id="themeToggle">🌓 מצב</button>button>
                    </div>div>
            </div>div>
    
        <div class="main-container">
                <div class="waveform-area">
                            <div class="canvas-container">
                                            <canvas id="waveformCanvas"></canvas>canvas>
                            </div>div>
                </div>div>
        
                <div class="sequencer-panel">
                            <div>
                                                <h3>סדרה</h3>h3>
                                                <div class="sequencer-grid" id="sequencerGrid">
                                                                        <!-- Circles generated by JS -->
                                                </div>
                            </div>

                                <div class="edit-panel" id="editPanel">
                                                    <h3>עריכה</h3>h3>

                                                    <div class="param-control">
                                                                            <label class="param-label">מתיחה</label>label>
                                                                            <input type="range" min="0.5" max="2" step="0.1" value="1" class="param-input" data-param="stretch">
                                                    </div>

                                                    <div class="param-control">
                                                                            <label class="param-label">דרג תדר (Pitch)</label>label>
                                                                            <div class="knob-row">
                                                                                                        <div class="control-knob" data-param="pitch" title="Pitch">0</div>
                                                                                </div>
                                                    </div>

                                                    <div class="param-control">
                                                                            <label class="param-label">מהירות</label>label>
                                                                            <input type="range" min="0.25" max="2" step="0.1" value="1" class="param-input" data-param="playspeed">
                                                    </div>

                                                    <div class="param-control">
                                                                            <label class="param-label">פאזה</label>label>
                                                                            <input type="range" min="0" max="360" step="1" value="0" class="param-input" data-param="phase">
                                                    </div>

                                                    <div class="param-control">
                                                                            <label class="param-label">עוצמה (Volume)</label>label>
                                                                            <input type="range" min="0" max="100" step="1" value="80" class="param-input" data-param="volume">
                                                    </div>

                                                    <div class="action-buttons" style="margin-top: 12px; flex-wrap: wrap;">
                                                                            <button class="btn" id="saveBtn">💾 שמור</button>button>
                                                                            <button class="btn" id="loadBtn">📂 טען</button>button>
                                                    </div>
                                </div>
                </div>
        </div>

            <div class="bottom-panel">
                        <div class="mode-indicator" id="modeIndicator">מצב הקלטה</div>
                        <div class="action-buttons">
                                        <button class="btn" id="recordBtn">⏺️ התחל</button>button>
                                        <button class="btn" id="stopBtn">⏹️ עצור</button>button>
                                        <button class="btn" id="playBtn">▶️ נגן</button>button>
                                        <button class="btn" id="clearBtn">🗑️ נקה</button>button>
                        </div>
            </div>

            <script>
                        // State
                        const state = {
                                        mode: 'record',
                                        isDarkMode: true,
                                        samples: [],
                                        isRecording: false,
                                        isPlaying: false,
                                        selectedSample: null,
                                        audioContext: null,
                                        mediaStream: null,
                                        mediaRecorder: null,
                                        recordedChunks: []
                        };

                        const colors = ['c1', 'c2', 'c3', 'c4', 'c5', 'c6', 'c7', 'c8', 'c9', 'c10'];

                        // Initialize
                        function init() {
                                        setupCanvas();
                                        setupEventListeners();
                                        createSequencerCircles();
                                        state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        }

                        // Canvas setup
                        function setupCanvas() {
                                        const canvas = document.getElementById('waveformCanvas');
                                        const ctx = canvas.getContext('2d');

                                        const container = canvas.parentElement;
                                        canvas.width = container.clientWidth;
                                        canvas.height = container.clientHeight;

                                        // Draw placeholder waveform
                                        drawWaveform(ctx, canvas.width, canvas.height);

                                        window.addEventListener('resize', () => {
                                                            canvas.width = container.clientWidth;
                                                            canvas.height = container.clientHeight;
                                                            drawWaveform(ctx, canvas.width, canvas.height);
                                        });
                        }

                        function drawWaveform(ctx, width, height) {
                                        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
                                        ctx.fillRect(0, 0, width, height);

                                        // Draw center line
                                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                                        ctx.lineWidth = 1;
                                        ctx.beginPath();
                                        ctx.moveTo(0, height / 2);
                                        ctx.lineTo(width, height / 2);
                                        ctx.stroke();

                                        // Draw sample waveforms
                                        if (state.samples.length > 0) {
                                                            state.samples.forEach((sample, idx) => {
                                                                                    const x = (sample.position / 100) * width;
                                                                                    const color = window.getComputedStyle(document.querySelector(`.sample-marker.${colors[idx % colors.length]}`))?.backgroundColor || '#FFB3BA';

                                                                                    ctx.fillStyle = color;
                                                                                    ctx.globalAlpha = 0.3;
                                                                                    ctx.fillRect(x - 5, height / 2 - 20, 10, 40);
                                                                                    ctx.globalAlpha = 1;
                                                            });
                                        }
                        }

                        // Sequencer circles
                        function createSequencerCircles() {
                                        const grid = document.getElementById('sequencerGrid');
                                        grid.innerHTML = '';

                                        for (let i = 0; i < 10; i++) {
                                                            const circle = document.createElement('div');
                                                            circle.className = `sequencer-circle ${colors[i]}`;
                                                            circle.dataset.sampleId = i;
                                                            circle.addEventListener('click', () => selectSample(i));
                                                            grid.appendChild(circle);
                                        }
                        }

                        // Event listeners
                        function setupEventListeners() {
                                        // Mode buttons
                                        document.querySelectorAll('[data-mode]').forEach(btn => {
                                                            btn.addEventListener('click', (e) => {
                                                                                    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
                                                                                    e.target.classList.add('active');
                                                                                    switchMode(e.target.dataset.mode);
                                                            });
                                        });

                                        // Control buttons
                                        document.getElementById('recordBtn').addEventListener('click', startRecording);
                                        document.getElementById('stopBtn').addEventListener('click', stopRecording);
                                        document.getElementById('playBtn').addEventListener('click', playSequence);
                                        document.getElementById('clearBtn').addEventListener('click', clearSamples);
                                        document.getElementById('saveBtn').addEventListener('click', saveSamples);
                                        document.getElementById('loadBtn').addEventListener('click', loadSamples);
                                        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

                                        // Canvas interactions
                                        document.getElementById('waveformCanvas').addEventListener('click', (e) => {
                                                            if (state.mode === 'edit') {
                                                                                    const rect = e.target.getBoundingClientRect();
                                                                                    const x = e.clientX - rect.left;
                                                                                    const position = (x / rect.width) * 100;
                                                                                    addSample(position);
                                                            }
                                        });
                        }

                        // Mode switching
                        function switchMode(mode) {
                                        state.mode = mode;
                                        const modeText = {
                                                            record: 'מצב הקלטה',
                                                            edit: 'מצב עריכה',
                                                            play: 'מצב נגינה'
                                        };
                                        document.getElementById('modeIndicator').textContent = modeText[mode];

                                        if (mode === 'edit') {
                                                            document.getElementById('editPanel').classList.add('active');
                                        } else {
                                                            document.getElementById('editPanel').classList.remove('active');
                                        }
                        }

                        // Recording
                        async function startRecording() {
                                        try {
                                                            state.mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                                                            state.mediaRecorder = new MediaRecorder(state.mediaStream);
                                                            state.recordedChunks = [];

                                                            state.mediaRecorder.addEventListener('dataavailable', (e) => {
                                                                                    state.recordedChunks.push(e.data);
                                                            });

                                                            state.mediaRecorder.start();
                                                            state.isRecording = true;
                                                            document.getElementById('recordBtn').classList.add('active');
                                        } catch (err) {
                                                            console.error('Recording failed:', err);
                                                            alert('אין הרשאה למיקרופון');
                                        }
                        }

                        function stopRecording() {
                                        if (state.mediaRecorder && state.isRecording) {
                                                            state.mediaRecorder.stop();
                                                            state.mediaStream.getTracks().forEach(track => track.stop());
                                                            state.isRecording = false;
                                                            document.getElementById('recordBtn').classList.remove('active');
                                        }
                        }

                        // Sample management
                        function addSample(position) {
                                        if (state.samples.length < 10) {
                                                            const sample = {
                                                                                    id: state.samples.length,
                                                                                    position: position,
                                                                                    pitch: 0,
                                                                                    stretch: 1,
                                                                                    playspeed: 1,
                                                                                    phase: 0,
                                                                                    volume: 80,
                                                                                    color: colors[state.samples.length]
                                                                };
                                                            state.samples.push(sample);
                                                            renderMarkers();
                                        }
                        }

                        function selectSample(id) {
                                        state.selectedSample = id;
                                        renderMarkers();
                                        document.getElementById('editPanel').classList.add('active');
                        }

                        function renderMarkers() {
                                        const canvas = document.getElementById('waveformCanvas');
                                        const container = canvas.parentElement;

                                        // Remove old markers
                                        document.querySelectorAll('.sample-marker').forEach(m => m.remove());

                                        // Add new markers
                                        state.samples.forEach((sample) => {
                                                            const marker = document.createElement('div');
                                                            marker.className = `sample-marker ${sample.color}`;
                                                            marker.style.left = `${sample.position}%`;
                                                            marker.style.top = '50%';
                                                            if (state.selectedSample === sample.id) {
                                                                                    marker.style.boxShadow = '0 0 12px rgba(74, 158, 255, 0.8)';
                                                            }
                                                            container.appendChild(marker);
                                        });
                        }

                        function clearSamples() {
                                        state.samples = [];
                                        state.selectedSample = null;
                                        document.querySelectorAll('.sample-marker').forEach(m => m.remove());
                        }

                        // Playback
                        function playSequence() {
                                        if (state.samples.length === 0) {
                                                            alert('אין דגימות להנגנה');
                                                            return;
                                        }

                                        state.isPlaying = true;
                                        document.getElementById('playBtn').classList.add('active');

                                        // Simple playback visualization
                                        state.samples.forEach((sample, idx) => {
                                                            setTimeout(() => {
                                                                                    const marker = document.querySelectorAll('.sample-marker')[idx];
                                                                                    if (marker) {
                                                                                                                marker.classList.add('playing');
                                                                                                                setTimeout(() => marker.classList.remove('playing'), 100);
                                                                                        }
                                                            }, idx * 200);
                                        });

                                        setTimeout(() => {
                                                            state.isPlaying = false;
                                                            document.getElementById('playBtn').classList.remove('active');
                                        }, state.samples.length * 200);
                        }

                        // Storage
                        function saveSamples() {
                                        const data = JSON.stringify(state.samples);
                                        localStorage.setItem('simpler_samples', data);
                                        alert('הדגימות נשמרו בהצלחה');
                        }

                        function loadSamples() {
                                        const data = localStorage.getItem('simpler_samples');
                                        if (data) {
                                                            state.samples = JSON.parse(data);
                                                            renderMarkers();
                                                            alert('הדגימות נטענו בהצלחה');
                                        } else {
                                                            alert('אין דגימות שמורות');
                                        }
                        }

                        // Theme
                        function toggleTheme() {
                                        state.isDarkMode = !state.isDarkMode;
                                        document.body.classList.toggle('light-mode');
                        }

                        // Start app
                        init();
            </script>
    </body>
</html>html>
            </script>
                            </div></h1>
    </body>
        </style></title>
